<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="analyticsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 柱状图 -->
  <rect x="20" y="60" width="8" height="30" fill="url(#analyticsGrad)" rx="2"/>
  <rect x="35" y="50" width="8" height="40" fill="url(#analyticsGrad)" rx="2"/>
  <rect x="50" y="40" width="8" height="50" fill="url(#analyticsGrad)" rx="2"/>
  <rect x="65" y="55" width="8" height="35" fill="url(#analyticsGrad)" rx="2"/>
  
  <!-- 基线 -->
  <line x1="15" y1="90" x2="80" y2="90" stroke="url(#analyticsGrad)" stroke-width="2"/>
  
  <!-- 上升趋势线 -->
  <polyline points="20,75 35,65 50,55 65,70" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
