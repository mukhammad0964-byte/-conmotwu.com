<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 云朵形状 -->
  <path d="M 30 65 Q 25 65 25 60 Q 25 50 35 45 Q 40 35 50 35 Q 65 35 70 45 Q 80 50 80 60 Q 80 65 75 65 Z" fill="url(#cloudGrad)" opacity="0.8"/>
  
  <!-- 云朵内部装饰 -->
  <path d="M 30 65 Q 25 65 25 60 Q 25 50 35 45 Q 40 35 50 35 Q 65 35 70 45 Q 80 50 80 60 Q 80 65 75 65 Z" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  
  <!-- 向上的箭头 -->
  <path d="M 50 55 L 50 35" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
  <path d="M 45 40 L 50 35 L 55 40" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
