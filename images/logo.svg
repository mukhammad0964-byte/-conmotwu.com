<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形渐变 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 外圈 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
  
  <!-- 内部渐变圆形 -->
  <circle cx="100" cy="100" r="85" fill="url(#grad1)" opacity="0.2"/>
  
  <!-- 主体方形 -->
  <rect x="70" y="70" width="60" height="60" fill="url(#grad1)" rx="8" filter="url(#shadow)"/>
  
  <!-- 内部装饰 -->
  <circle cx="100" cy="100" r="15" fill="#ffd700"/>
  
  <!-- 边角装饰 -->
  <circle cx="75" cy="75" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="125" cy="75" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="75" cy="125" r="3" fill="#ffd700" opacity="0.6"/>
  <circle cx="125" cy="125" r="3" fill="#ffd700" opacity="0.6"/>
</svg>
