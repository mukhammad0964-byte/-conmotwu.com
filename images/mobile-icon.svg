<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 手机外形 -->
  <rect x="25" y="15" width="50" height="70" fill="none" stroke="url(#mobileGrad)" stroke-width="2" rx="4"/>
  
  <!-- 屏幕 -->
  <rect x="30" y="20" width="40" height="55" fill="#0066cc" opacity="0.2" rx="2"/>
  
  <!-- 顶部刘海 -->
  <ellipse cx="50" cy="22" rx="8" ry="2" fill="url(#mobileGrad)"/>
  
  <!-- 底部Home键 -->
  <circle cx="50" cy="78" r="2" fill="url(#mobileGrad)"/>
  
  <!-- 屏幕内容指示 -->
  <rect x="33" y="28" width="30" height="3" fill="#ffd700" opacity="0.8" rx="1"/>
  <rect x="33" y="35" width="34" height="2" fill="#ffd700" opacity="0.6" rx="1"/>
  <rect x="33" y="40" width="30" height="2" fill="#ffd700" opacity="0.6" rx="1"/>
</svg>
